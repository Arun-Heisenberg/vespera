kind = "web"
previewPath = "/"
title = "Vespera"
version = "1.0.0"
id = "artifacts/vespera"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20714

[services.development]
run = "pnpm --filter @workspace/vespera run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vespera", "run", "build" ]
publicDir = "artifacts/vespera/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20714"
BASE_PATH = "/"
